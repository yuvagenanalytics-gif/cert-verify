<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Certificate Verification – Yuva Gen Analytics</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }
    .logo-area {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
    }
    .logo-area img {
      height: 70px;
      width: auto;
    }
    .logo-text h1 {
      font-size: 1.6rem;
      color: #0d2b4e;
      font-weight: 700;
    }
    .logo-text span {
      display: block;
      font-size: 0.85rem;
      color: #4a7ab5;
      font-weight: 400;
    }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 36px 32px;
      max-width: 480px;
      width: 100%;
    }
    h2 { color: #0d2b4e; font-size: 1.2rem; margin-bottom: 8px; }
    p.sub { color: #666; font-size: 0.9rem; margin-bottom: 24px; }
    label { display: block; font-size: 0.85rem; font-weight: 600; color: #333; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #d0dce8;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border 0.2s;
    }
    input:focus { border-color: #4a7ab5; }
    button {
      margin-top: 16px;
      width: 100%;
      padding: 13px;
      background: #0d2b4e;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #1a4070; }
    .result { margin-top: 24px; border-radius: 10px; padding: 20px; display: none; }
    .result.valid { background: #e8f5e9; border: 2px solid #43a047; display: block; }
    .result.invalid { background: #ffebee; border: 2px solid #e53935; display: block; }
    .result .status {
      font-size: 1.1rem; font-weight: 700;
      display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
    }
    .valid .status { color: #2e7d32; }
    .invalid .status { color: #c62828; }
    .detail-row {
      display: flex; justify-content: space-between;
      padding: 6px 0; border-bottom: 1px solid rgba(0,0,0,0.07); font-size: 0.9rem;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-row .label { color: #555; }
    .detail-row .value { font-weight: 600; color: #0d2b4e; text-align: right; max-width: 60%; }
    .footer { margin-top: 40px; font-size: 0.8rem; color: #888; text-align: center; }
  </style>
</head>
