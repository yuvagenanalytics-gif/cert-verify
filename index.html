      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }
    .logo-area {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
    }
    .logo-area img { height: 56px; }
    .logo-area h1 { font-size: 1.5rem; color: #0d2b4e; }
    .logo-area span { display: block; font-size: 0.85rem; color: #4a7ab5; font-weight: 400; }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 36px 32px;
      max-width: 480px;
      width: 100%;
    }
    h2 { color: #0d2b4e; font-size: 1.2rem; margin-bottom: 8px; }
    p.sub { color: #666; font-size: 0.9rem; margin-bottom: 24px; }
    label { display: block; font-size: 0.85rem; font-weight: 600; color: #333; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #d0dce8;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border 0.2s;
    }
    input:focus { border-color: #4a7ab5; }
    button {
      margin-top: 16px;
      width: 100%;
      padding: 13px;
      background: #0d2b4e;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #1a4070; }
    .result { margin-top: 24px; border-radius: 10px; padding: 20px; display: none; }
    .result.valid {
      background: #e8f5e9;
      border: 2px solid #43a047;
      display: block;
    }
    .result.invalid {
      background: #ffebee;
      border: 2px solid #e53935;
      display: block;
    }
    .result .status {
      font-size: 1.1rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .valid .status { color: #2e7d32; }
    .invalid .status { color: #c62828; }
    .detail-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(0,0,0,0.07); font-size: 0.9rem; }
    .detail-row:last-child { border-bottom: none; }
    .detail-row .label { color: #555; }
    .detail-row .value { font-weight: 600; color: #0d2b4e; text-align: right; max-width: 60%; }
    .footer { margin-top: 40px; font-size: 0.8rem; color: #888; text-align: center; }
  </style>
</head>
<body>

  <button onclick="verify()">🔍 Verify Certificate</button>

function verify() {
  const input = document.getElementById('certId').value.trim().toUpperCase();
  const resultDiv = document.getElementById('result');
  const found = ATTENDEES.find(a => a.id === input);

  if (!found) {
    resultDiv.className = 'result invalid';
    resultDiv.innerHTML = `
      <div class="status">❌ Certificate Not Found</div>
      <p style="font-size:0.9rem;color:#555;">No certificate with ID <strong>${input}</strong> exists in our records. This may be a fake or edited certificate.</p>
    `;
  } else {
    resultDiv.className = 'result valid';
    resultDiv.innerHTML = `
      <div class="status">✅ Certificate is Valid</div>
      <div class="detail-row"><span class="label">Issued To</span><span class="value">${found.name}</span></div>
      <div class="detail-row"><span class="label">Certificate ID</span><span class="value">${found.id}</span></div>
      <div class="detail-row"><span class="label">Workshop</span><span class="value">${found.course}</span></div>
      <div class="detail-row"><span class="label">Date</span><span class="value">${found.date}</span></div>
      <div class="detail-row"><span class="label">Issued By</span><span class="value">Yuva Gen Analytics</span></div>
    `;
  }
}

// Allow Enter key
document.getElementById('certId').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') verify();
});

// Auto-verify if ?id=YGA-001 in URL (from QR code scan)
window.onload = function() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (id) {
    document.getElementById('certId').value = id;
    verify();
  }
};
